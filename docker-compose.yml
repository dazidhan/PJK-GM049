version: '3.8'

services:
  # ==========================================
  # 1. AI Service (Python FastAPI)
  # ==========================================
  ai-service:
    build: 
      context: ./Model_AI
    container_name: jabarulin-ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    restart: unless-stopped
    networks:
      - jabarulin-network

  # ==========================================
  # 2. Backend Service (Node.js Express)
  # ==========================================
  backend-service:
    build: 
      context: ./Backend
    container_name: jabarulin-backend-service
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - PORT=5000
      # Memaksa backend menembak AI Service melalui internal docker network
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - ai-service
      - db
    restart: unless-stopped
    networks:
      - jabarulin-network

  # ==========================================
  # 3. Database Service (MongoDB)
  # ==========================================
  db:
    image: mongo:7
    container_name: jabarulin-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jabarulin-network

# ==========================================
# Network Internal Docker
# ==========================================
networks:
  jabarulin-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  mongo-data:
